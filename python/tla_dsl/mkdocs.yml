site_name: TLA DSL Docs
docs_dir: docs
site_dir: site
use_directory_urls: false

theme:
  name: readthedocs
  navigation_depth: 3
  collapse_navigation: false

nav:
  - Overview: index.md
  - Core API Reference: api-reference.md

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code

validation:
  links:
    not_found: ignore
